name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run test suite
        run: make test

      - name: Ensure no Python cache artifacts
        run: |
          if find . -name '__pycache__' -print | grep .; then
            echo "Python cache artifacts found"
            exit 1
          fi
