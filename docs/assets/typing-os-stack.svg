<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">MBTI Typing OS Stack</title>
  <desc id="desc">A layered operating-system style diagram for the MBTI Typing Skill, connecting intake, hypotheses, questions, evidence, type duels, audits, distribution, and release gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdfc"/>
      <stop offset="0.58" stop-color="#edf5f3"/>
      <stop offset="1" stop-color="#fff3e1"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#39c6b8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b66a08"/>
      <stop offset="1" stop-color="#f7b84b"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9d174d"/>
      <stop offset="1" stop-color="#e95f8f"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172120"/>
      <stop offset="1" stop-color="#34433f"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#172120" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #ffffff; stroke: #d5dfdc; stroke-width: 2; filter: url(#shadow); }
      .rail { fill: url(#dark); filter: url(#shadow); }
      .soft { fill: #fbfdfc; stroke: #d5dfdc; stroke-width: 2; }
      .ink { fill: #172120; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #63706d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 44px; font-weight: 900; }
      .label { font-size: 23px; font-weight: 900; }
      .small { font-size: 16px; font-weight: 650; }
      .micro { font-size: 14px; font-weight: 760; }
      .teal { fill: url(#teal); }
      .amber { fill: url(#amber); }
      .rose { fill: url(#rose); }
      .line { fill: none; stroke: #0f766e; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1020"/>
  <text x="80" y="78" class="ink title">MBTI Typing OS Stack</text>
  <text x="82" y="114" class="muted small">A maintainable skill should feel broad to users, but stay layered internally: one protocol, many surfaces, auditable gates.</text>

  <rect x="90" y="155" width="1020" height="735" rx="28" class="panel"/>
  <rect x="1190" y="155" width="320" height="735" rx="28" class="rail"/>

  <g transform="translate(140 205)">
    <rect width="920" height="72" rx="18" fill="#e6f5f2" stroke="#93d1c8" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" class="teal"/>
    <path d="M31 36 h22 M42 25 v22" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="82" y="32" class="ink label">Intake Layer</text>
    <text x="260" y="32" class="muted small">claim, exported chat, old report, contradiction, follow-up evidence</text>
    <text x="82" y="56" class="muted micro">normal state / stress state / public role / relationship context are separated before inference</text>
  </g>
  <g transform="translate(140 300)">
    <rect width="920" height="72" rx="18" fill="#fff1d9" stroke="#efc471" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" class="amber"/>
    <text x="31" y="44" fill="#fff" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">16</text>
    <text x="82" y="32" class="ink label">Hypothesis Layer</text>
    <text x="282" y="32" class="muted small">all 16 types, leading candidate, serious runner-up, active third</text>
    <text x="82" y="56" class="muted micro">types are candidates with evidence weights, not verdicts or identities</text>
  </g>
  <g transform="translate(140 395)">
    <rect width="920" height="72" rx="18" fill="#fde7ef" stroke="#e6a5bc" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" class="rose"/>
    <path d="M34 29 h17 M34 37 h23 M34 45 h13" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="82" y="32" class="ink label">Question Layer</text>
    <text x="270" y="32" class="muted small">4-6 adaptive probes from question-bank.md and current fork</text>
    <text x="82" y="56" class="muted micro">each prompt must explain the fork it is trying to resolve</text>
  </g>
  <g transform="translate(140 490)">
    <rect width="920" height="72" rx="18" fill="#e6f5f2" stroke="#93d1c8" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" class="teal"/>
    <path d="M31 29 h23 M31 37 h29 M31 45 h16" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="82" y="32" class="ink label">Evidence Layer</text>
    <text x="260" y="32" class="muted small">support, weaken, caveat, source, confidence movement</text>
    <text x="82" y="56" class="muted micro">ledger deltas make the user feel remembered across rounds</text>
  </g>
  <g transform="translate(140 585)">
    <rect width="920" height="72" rx="18" fill="#fff1d9" stroke="#efc471" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" class="amber"/>
    <text x="31" y="44" fill="#fff" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">vs</text>
    <text x="82" y="32" class="ink label">Duel Layer</text>
    <text x="222" y="32" class="muted small">pair-duels.md, killer discriminators, losing conditions</text>
    <text x="82" y="56" class="muted micro">the closest rival is attacked before the final report is allowed</text>
  </g>
  <g transform="translate(140 680)">
    <rect width="920" height="72" rx="18" fill="#fde7ef" stroke="#e6a5bc" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" class="rose"/>
    <path d="M42 25 v20 M42 53 h1" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="82" y="32" class="ink label">Audit Layer</text>
    <text x="222" y="32" class="muted small">falsifier, safety boundary, report audit, response eval, calibration</text>
    <text x="82" y="56" class="muted micro">a beautiful answer is blocked if it drops alternatives or overclaims</text>
  </g>
  <g transform="translate(140 775)">
    <rect width="920" height="72" rx="18" fill="#eef1f0" stroke="#cfd8d5" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" fill="#172120"/>
    <path d="M31 28 h23 M31 36 h29 M31 44 h18" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="82" y="32" class="ink label">Distribution Layer</text>
    <text x="286" y="32" class="muted small">Agent Core Pack, portable AGENTS.md, optional manifest recipes</text>
    <text x="82" y="56" class="muted micro">Codex, Claude Code, Cursor, and opencode stay first-class without forking the protocol</text>
  </g>

  <path d="M600 277 V300" class="line"/>
  <path d="M600 372 V395" class="line"/>
  <path d="M600 467 V490" class="line"/>
  <path d="M600 562 V585" class="line"/>
  <path d="M600 657 V680" class="line"/>
  <path d="M600 752 V775" class="line"/>

  <text x="1230" y="220" class="white" font-size="26" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Release Gates</text>
  <text x="1232" y="252" fill="#cce7e3" font-size="16" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">visible proof before claims</text>
  <g transform="translate(1230 300)">
    <rect width="230" height="76" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="22" y="33" class="ink" font-size="19" font-weight="900">make test</text>
    <text x="22" y="58" class="muted small">full local scorecard</text>
  </g>
  <g transform="translate(1230 405)">
    <rect width="230" height="76" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="22" y="33" class="ink" font-size="19" font-weight="900">repository_scorecard.py</text>
    <text x="22" y="58" class="muted small">GitHub UX proof</text>
  </g>
  <g transform="translate(1230 510)">
    <rect width="230" height="76" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="22" y="33" class="ink" font-size="19" font-weight="900">Agent Core Pack</text>
    <text x="22" y="58" class="muted small">small maintained surface</text>
  </g>
  <g transform="translate(1230 615)">
    <rect width="230" height="76" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="22" y="33" class="ink" font-size="19" font-weight="900">safety boundary</text>
    <text x="22" y="58" class="muted small">no clinical or hiring use</text>
  </g>
  <g transform="translate(1230 720)">
    <rect width="230" height="76" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="22" y="33" class="ink" font-size="19" font-weight="900">versioned release</text>
    <text x="22" y="58" class="muted small">Pages and GitHub users</text>
  </g>

  <path d="M1060 810 C1135 810 1160 758 1230 758" class="line dash"/>
  <path d="M1060 716 C1135 716 1160 650 1230 650" class="line dash"/>
  <path d="M1060 240 C1160 240 1190 338 1230 338" class="line dash"/>
</svg>
