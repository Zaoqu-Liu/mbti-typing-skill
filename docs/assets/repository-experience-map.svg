<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">GitHub visitor experience map for MBTI Typing Skill</title>
  <desc id="desc">A structured product map showing how a first-time GitHub visitor moves from intent, to Session Lab, to trust proof, install, and contribution paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="0.48" stop-color="#eef5f3"/>
      <stop offset="1" stop-color="#fff7eb"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#39c6b8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b66a08"/>
      <stop offset="1" stop-color="#f7b84b"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9d174d"/>
      <stop offset="1" stop-color="#e95f8f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#172120" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-teal" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#b66a08"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #ffffff; stroke: #d9dfdd; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: rgba(255,255,255,0.72); stroke: #d9dfdd; stroke-width: 2; }
      .ink { fill: #172120; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #63706d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .micro { font-size: 18px; font-weight: 700; }
      .label { font-size: 24px; font-weight: 800; }
      .title { font-size: 46px; font-weight: 900; }
      .small { font-size: 17px; font-weight: 650; }
      .node { fill: #fbfdfc; stroke: #cfd8d5; stroke-width: 2; }
      .teal { fill: url(#teal); }
      .amber { fill: url(#amber); }
      .magenta { fill: url(#magenta); }
      .line-teal { fill: none; stroke: #0f766e; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow-teal); }
      .line-amber { fill: none; stroke: #b66a08; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow-amber); }
      .dash { stroke-dasharray: 12 12; }
      .grid { stroke: #dfe6e4; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="920"/>
  <g opacity="0.38">
    <path class="grid" d="M80 130 H1520"/>
    <path class="grid" d="M80 250 H1520"/>
    <path class="grid" d="M80 370 H1520"/>
    <path class="grid" d="M80 490 H1520"/>
    <path class="grid" d="M80 610 H1520"/>
    <path class="grid" d="M80 730 H1520"/>
    <path class="grid" d="M210 70 V850"/>
    <path class="grid" d="M440 70 V850"/>
    <path class="grid" d="M670 70 V850"/>
    <path class="grid" d="M900 70 V850"/>
    <path class="grid" d="M1130 70 V850"/>
    <path class="grid" d="M1360 70 V850"/>
  </g>

  <text x="80" y="76" class="ink title">GitHub Visitor Experience Map</text>
  <text x="82" y="110" class="muted small">From curiosity to a working MBTI typing session in under one minute, with proof visible before installation.</text>

  <rect x="70" y="150" width="330" height="600" rx="18" class="panel"/>
  <text x="100" y="198" class="ink label">Visitor intent</text>
  <text x="100" y="228" class="muted small">The README routes four different jobs.</text>

  <g transform="translate(100 270)">
    <rect width="260" height="84" rx="14" class="node"/>
    <circle cx="42" cy="42" r="25" class="teal"/>
    <path d="M32 43 h20 M42 33 v20" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="82" y="34" class="ink micro">Can it type me?</text>
    <text x="82" y="60" class="muted small">Try evidence first</text>
  </g>
  <g transform="translate(100 378)">
    <rect width="260" height="84" rx="14" class="node"/>
    <circle cx="42" cy="42" r="25" class="amber"/>
    <path d="M29 44 l10 10 l20 -25" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="82" y="34" class="ink micro">Can I trust it?</text>
    <text x="82" y="60" class="muted small">See gates and limits</text>
  </g>
  <g transform="translate(100 486)">
    <rect width="260" height="84" rx="14" class="node"/>
    <circle cx="42" cy="42" r="25" fill="#26302f"/>
    <path d="M31 34 h22 v20 H31 Z M36 40 h12 M36 47 h12" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="82" y="34" class="ink micro">Can I install it?</text>
    <text x="82" y="60" class="muted small">Copy two commands</text>
  </g>
  <g transform="translate(100 594)">
    <rect width="260" height="84" rx="14" class="node"/>
    <circle cx="42" cy="42" r="25" class="magenta"/>
    <path d="M30 51 c12 -30 30 -30 42 0 M37 43 h28" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="82" y="34" class="ink micro">Can I improve it?</text>
    <text x="82" y="60" class="muted small">Benchmarks and PRs</text>
  </g>

  <rect x="470" y="150" width="660" height="600" rx="18" class="panel"/>
  <text x="505" y="198" class="ink label">First-run product path</text>
  <text x="505" y="228" class="muted small">See and try the loop before reading theory.</text>

  <g transform="translate(520 278)">
    <rect width="170" height="110" rx="16" class="node"/>
    <circle cx="38" cy="35" r="19" class="teal"/>
    <path d="M30 34 h16 M38 26 v16" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="22" y="76" class="ink micro">Paste claim</text>
    <text x="22" y="99" class="muted small">Messy notes in</text>
  </g>
  <g transform="translate(755 278)">
    <rect width="170" height="110" rx="16" class="node"/>
    <circle cx="38" cy="35" r="19" class="amber"/>
    <path d="M27 42 h22 M27 34 h30 M27 26 h16" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="22" y="76" class="ink micro">Candidate board</text>
    <text x="22" y="99" class="muted small">Runner-up stays</text>
  </g>
  <g transform="translate(990 278)">
    <rect width="90" height="110" rx="16" class="soft"/>
    <text x="27" y="48" class="ink" font-size="38" font-weight="900">vs</text>
    <text x="22" y="78" class="muted small">duel</text>
  </g>
  <g transform="translate(520 458)">
    <rect width="170" height="110" rx="16" class="node"/>
    <circle cx="38" cy="35" r="19" fill="#26302f"/>
    <path d="M29 28 h18 M29 36 h25 M29 44 h12" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="22" y="76" class="ink micro">Evidence ledger</text>
    <text x="22" y="99" class="muted small">Support and weaken</text>
  </g>
  <g transform="translate(755 458)">
    <rect width="170" height="110" rx="16" class="node"/>
    <circle cx="38" cy="35" r="19" class="magenta"/>
    <path d="M38 24 v18 M38 50 h1" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="22" y="76" class="ink micro">Contradictions</text>
    <text x="22" y="99" class="muted small">Turn into probes</text>
  </g>
  <g transform="translate(990 458)">
    <rect width="90" height="110" rx="16" class="soft"/>
    <path d="M24 35 h42 M24 55 h42 M24 75 h26" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
    <text x="20" y="100" class="muted small">report</text>
  </g>

  <path d="M690 333 C720 333 725 333 755 333" class="line-teal"/>
  <path d="M925 333 C955 333 960 333 990 333" class="line-amber"/>
  <path d="M1035 388 C1035 422 1035 424 1035 458" class="line-amber"/>
  <path d="M990 512 C955 512 960 512 925 512" class="line-teal"/>
  <path d="M755 512 C720 512 725 512 690 512" class="line-teal"/>
  <path d="M605 458 C605 424 605 422 605 388" class="line-teal dash"/>
  <path d="M840 388 C840 422 840 424 840 458" class="line-amber dash"/>

  <rect x="1188" y="150" width="342" height="600" rx="18" class="panel"/>
  <text x="1220" y="198" class="ink label">Proof and action</text>
  <text x="1220" y="228" class="muted small">Trust artifacts stay next to action.</text>

  <g transform="translate(1220 278)">
    <rect width="270" height="70" rx="14" class="node"/>
    <circle cx="35" cy="35" r="18" class="teal"/>
    <path d="M27 35 h16 M35 27 v16" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="70" y="31" class="ink micro">Copy Codex prompt</text>
    <text x="70" y="54" class="muted small">Continue in a real session</text>
  </g>
  <g transform="translate(1220 374)">
    <rect width="270" height="70" rx="14" class="node"/>
    <circle cx="35" cy="35" r="18" class="amber"/>
    <path d="M25 36 h20 M35 26 v20" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="70" y="31" class="ink micro">Share link / JSON</text>
    <text x="70" y="54" class="muted small">Recover work locally</text>
  </g>
  <g transform="translate(1220 470)">
    <rect width="270" height="70" rx="14" class="node"/>
    <circle cx="35" cy="35" r="18" fill="#26302f"/>
    <path d="M25 28 h22 M25 36 h16 M25 44 h26" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="70" y="31" class="ink micro">Install skill</text>
    <text x="70" y="54" class="muted small">Copy README commands</text>
  </g>
  <g transform="translate(1220 566)">
    <rect width="270" height="70" rx="14" class="node"/>
    <circle cx="35" cy="35" r="18" class="magenta"/>
    <path d="M25 39 c7 -18 25 -18 32 0 M31 35 h20" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="70" y="31" class="ink micro">Contribute cases</text>
    <text x="70" y="54" class="muted small">Issue to benchmark</text>
  </g>

  <path d="M400 312 C430 312 440 312 470 312" class="line-teal"/>
  <path d="M400 420 C430 420 440 420 470 420" class="line-amber"/>
  <path d="M400 528 C430 528 440 528 470 528" class="line-teal"/>
  <path d="M400 636 C430 636 440 636 470 636" class="line-amber"/>
  <path d="M1130 333 C1155 333 1162 333 1188 333" class="line-teal"/>
  <path d="M1130 512 C1155 512 1162 512 1188 512" class="line-amber"/>

  <rect x="110" y="795" width="1380" height="78" rx="18" fill="#172120"/>
  <g transform="translate(145 820)">
    <circle cx="20" cy="20" r="16" fill="#39c6b8"/>
    <path d="M13 20 h14 M20 13 v14" stroke="#172120" stroke-width="4" stroke-linecap="round"/>
    <text x="48" y="26" fill="#fff" font-size="18" font-weight="800" font-family="Inter, ui-sans-serif, system-ui">No account / network / build</text>
  </g>
  <g transform="translate(602 820)">
    <circle cx="20" cy="20" r="16" fill="#f7b84b"/>
    <path d="M11 21 l7 7 l15 -20" stroke="#172120" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="26" fill="#fff" font-size="18" font-weight="800" font-family="Inter, ui-sans-serif, system-ui">Scorecards before release</text>
  </g>
  <g transform="translate(990 820)">
    <circle cx="20" cy="20" r="16" fill="#e95f8f"/>
    <path d="M20 10 v18 M20 35 h1" stroke="#172120" stroke-width="4" stroke-linecap="round"/>
    <text x="48" y="26" fill="#fff" font-size="18" font-weight="800" font-family="Inter, ui-sans-serif, system-ui">Safety boundaries upfront</text>
  </g>
</svg>
