<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark Type Coverage Matrix</title>
  <desc id="desc">A 4 by 4 matrix showing that all 16 MBTI type codes are covered as leading hypotheses by synthetic benchmark cases.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="0.48" stop-color="#eef7f5"/>
      <stop offset="1" stop-color="#fff6e8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="145%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#172120" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 900 42px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172120; }
      .subtitle { font: 600 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #63706d; }
      .type { font: 900 34px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172120; }
      .case { font: 800 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #26302f; }
      .trap { font: 650 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #63706d; }
      .group { font: 900 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #075e58; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #d9dfdd; stroke-width: 1.2; rx: 12; filter: url(#shadow); }
      .analyst { fill: #e7f1ff; }
      .diplomat { fill: #e7f7ef; }
      .sentinel { fill: #fff0d7; }
      .explorer { fill: #fde7ee; }
      .stamp { fill: #26302f; rx: 18; }
      .stampText { font: 900 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="48" y="42" width="1304" height="816" rx="24" fill="#ffffff" opacity="0.76" stroke="#d9dfdd"/>
  <text x="82" y="104" class="title">Benchmark Type Coverage Matrix</text>
  <text x="82" y="138" class="subtitle">Every type now appears as a leading hypothesis at least once, with a serious runner-up and falsifier theme attached.</text>
  <rect x="1110" y="82" width="166" height="36" class="stamp"/>
  <text x="1144" y="105" class="stampText">16 / 16 covered</text>

  <g transform="translate(82 182)">
    <rect x="0" y="0" width="286" height="145" class="card analyst"/>
    <text x="24" y="46" class="type">INTJ</text>
    <text x="24" y="76" class="case">bench-intj-entj-002</text>
    <text x="24" y="104" class="trap">Private model first</text>
    <text x="24" y="128" class="group">Analyst</text>

    <rect x="316" y="0" width="286" height="145" class="card analyst"/>
    <text x="340" y="46" class="type">INTP</text>
    <text x="340" y="76" class="case">bench-intp-istp-012</text>
    <text x="340" y="104" class="trap">Model purity first</text>
    <text x="340" y="128" class="group">Analyst</text>

    <rect x="632" y="0" width="286" height="145" class="card analyst"/>
    <text x="656" y="46" class="type">ENTJ</text>
    <text x="656" y="76" class="case">bench-entj-intj-001</text>
    <text x="656" y="104" class="trap">Command energy</text>
    <text x="656" y="128" class="group">Analyst</text>

    <rect x="948" y="0" width="286" height="145" class="card analyst"/>
    <text x="972" y="46" class="type">ENTP</text>
    <text x="972" y="76" class="case">bench-entp-enfp-006</text>
    <text x="972" y="104" class="trap">Model play first</text>
    <text x="972" y="128" class="group">Analyst</text>

    <rect x="0" y="175" width="286" height="145" class="card diplomat"/>
    <text x="24" y="221" class="type">INFJ</text>
    <text x="24" y="251" class="case">bench-infj-infp-004</text>
    <text x="24" y="279" class="trap">Relational trajectory</text>
    <text x="24" y="303" class="group">Diplomat</text>

    <rect x="316" y="175" width="286" height="145" class="card diplomat"/>
    <text x="340" y="221" class="type">INFP</text>
    <text x="340" y="251" class="case">bench-infp-infj-003</text>
    <text x="340" y="279" class="trap">Inner congruence</text>
    <text x="340" y="303" class="group">Diplomat</text>

    <rect x="632" y="175" width="286" height="145" class="card diplomat"/>
    <text x="656" y="221" class="type">ENFJ</text>
    <text x="656" y="251" class="case">bench-enfj-esfj-009</text>
    <text x="656" y="279" class="trap">People development</text>
    <text x="656" y="303" class="group">Diplomat</text>

    <rect x="948" y="175" width="286" height="145" class="card diplomat"/>
    <text x="972" y="221" class="type">ENFP</text>
    <text x="972" y="251" class="case">bench-enfp-entp-016</text>
    <text x="972" y="279" class="trap">Meaningful possibility</text>
    <text x="972" y="303" class="group">Diplomat</text>

    <rect x="0" y="350" width="286" height="145" class="card sentinel"/>
    <text x="24" y="396" class="type">ISTJ</text>
    <text x="24" y="426" class="case">bench-istj-intj-015</text>
    <text x="24" y="454" class="trap">Record accuracy</text>
    <text x="24" y="478" class="group">Sentinel</text>

    <rect x="316" y="350" width="286" height="145" class="card sentinel"/>
    <text x="340" y="396" class="type">ISFJ</text>
    <text x="340" y="426" class="case">bench-isfj-infj-007</text>
    <text x="340" y="454" class="trap">Known obligations</text>
    <text x="340" y="478" class="group">Sentinel</text>

    <rect x="632" y="350" width="286" height="145" class="card sentinel"/>
    <text x="656" y="396" class="type">ESTJ</text>
    <text x="656" y="426" class="case">bench-estj-entj-005</text>
    <text x="656" y="454" class="trap">Precedent trust</text>
    <text x="656" y="478" class="group">Sentinel</text>

    <rect x="948" y="350" width="286" height="145" class="card sentinel"/>
    <text x="972" y="396" class="type">ESFJ</text>
    <text x="972" y="426" class="case">bench-esfj-enfj-010</text>
    <text x="972" y="454" class="trap">Social continuity</text>
    <text x="972" y="478" class="group">Sentinel</text>

    <rect x="0" y="525" width="286" height="145" class="card explorer"/>
    <text x="24" y="571" class="type">ISTP</text>
    <text x="24" y="601" class="case">bench-istp-intp-011</text>
    <text x="24" y="629" class="trap">Tool logic</text>
    <text x="24" y="653" class="group">Explorer</text>

    <rect x="316" y="525" width="286" height="145" class="card explorer"/>
    <text x="340" y="571" class="type">ISFP</text>
    <text x="340" y="601" class="case">bench-isfp-infp-013</text>
    <text x="340" y="629" class="trap">Embodied value</text>
    <text x="340" y="653" class="group">Explorer</text>

    <rect x="632" y="525" width="286" height="145" class="card explorer"/>
    <text x="656" y="571" class="type">ESTP</text>
    <text x="656" y="601" class="case">bench-estp-entp-008</text>
    <text x="656" y="629" class="trap">Live pressure</text>
    <text x="656" y="653" class="group">Explorer</text>

    <rect x="948" y="525" width="286" height="145" class="card explorer"/>
    <text x="972" y="571" class="type">ESFP</text>
    <text x="972" y="601" class="case">bench-esfp-estp-014</text>
    <text x="972" y="629" class="trap">Live authenticity</text>
    <text x="972" y="653" class="group">Explorer</text>
  </g>

  <text x="82" y="820" class="subtitle">Coverage is necessary but not sufficient: each tile still requires runner-up steelmanning, evidence tags, and a falsifier before it counts.</text>
</svg>
