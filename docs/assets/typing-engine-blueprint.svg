<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">MBTI typing engine blueprint</title>
  <desc id="desc">A technical visual blueprint showing candidate hypotheses, evidence routing, adjacent type duels, report audit, and falsifier gates.</desc>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0" stop-color="#e7fffb"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4f2"/>
    </radialGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182322"/>
      <stop offset="1" stop-color="#2c3735"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#39c6b8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b66a08"/>
      <stop offset="1" stop-color="#f7b84b"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9d174d"/>
      <stop offset="1" stop-color="#e95f8f"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#172120" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#128c82"/>
    </marker>
    <marker id="arrow2" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#b66a08"/>
    </marker>
    <style>
      .bg { fill: #f7f8f8; }
      .ink { fill: #172120; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #63706d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { fill: #ffffff; stroke: #d9dfdd; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #fbfdfc; stroke: #d9dfdd; stroke-width: 2; }
      .dark { fill: url(#darkPanel); filter: url(#shadow); }
      .title { font-size: 44px; font-weight: 900; }
      .label { font-size: 24px; font-weight: 900; }
      .small { font-size: 17px; font-weight: 650; }
      .micro { font-size: 15px; font-weight: 750; }
      .code { font-size: 21px; font-weight: 900; }
      .teal { fill: url(#teal); }
      .amber { fill: url(#amber); }
      .magenta { fill: url(#magenta); }
      .line { fill: none; stroke: #128c82; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .line2 { fill: none; stroke: #b66a08; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow2); }
      .dash { stroke-dasharray: 10 12; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="80" y="80" class="ink title">Typing Engine Blueprint</text>
  <text x="82" y="115" class="muted small">The product promise is not a better label. It is a visible machine for preserving alternatives, attacking weak evidence, and reporting uncertainty.</text>

  <rect x="60" y="150" width="360" height="760" rx="22" class="panel"/>
  <text x="95" y="198" class="ink label">Candidate universe</text>
  <text x="95" y="229" class="muted small">All 16 types stay reachable until evidence removes them.</text>
  <g transform="translate(95 270)">
    <g>
      <rect width="70" height="54" rx="12" fill="#e5f5f2" stroke="#91cfc7"/>
      <text x="17" y="35" class="ink code">INTJ</text>
    </g>
    <g transform="translate(84 0)">
      <rect width="70" height="54" rx="12" fill="#e5f5f2" stroke="#91cfc7"/>
      <text x="16" y="35" class="ink code">INTP</text>
    </g>
    <g transform="translate(168 0)">
      <rect width="70" height="54" rx="12" fill="#fff0d8" stroke="#e8b76b"/>
      <text x="14" y="35" class="ink code">ENTJ</text>
    </g>
    <g transform="translate(252 0)">
      <rect width="70" height="54" rx="12" fill="#fff0d8" stroke="#e8b76b"/>
      <text x="13" y="35" class="ink code">ENTP</text>
    </g>
    <g transform="translate(0 72)">
      <rect width="70" height="54" rx="12" fill="#e5f5f2" stroke="#91cfc7"/>
      <text x="18" y="35" class="ink code">INFJ</text>
    </g>
    <g transform="translate(84 72)">
      <rect width="70" height="54" rx="12" fill="#fde7ef" stroke="#e6a5bc"/>
      <text x="16" y="35" class="ink code">INFP</text>
    </g>
    <g transform="translate(168 72)">
      <rect width="70" height="54" rx="12" fill="#fff0d8" stroke="#e8b76b"/>
      <text x="13" y="35" class="ink code">ENFJ</text>
    </g>
    <g transform="translate(252 72)">
      <rect width="70" height="54" rx="12" fill="#fde7ef" stroke="#e6a5bc"/>
      <text x="12" y="35" class="ink code">ENFP</text>
    </g>
    <g transform="translate(0 144)">
      <rect width="70" height="54" rx="12" fill="#eef1f0" stroke="#cfd8d5"/>
      <text x="18" y="35" class="ink code">ISTJ</text>
    </g>
    <g transform="translate(84 144)">
      <rect width="70" height="54" rx="12" fill="#eef1f0" stroke="#cfd8d5"/>
      <text x="16" y="35" class="ink code">ISFJ</text>
    </g>
    <g transform="translate(168 144)">
      <rect width="70" height="54" rx="12" fill="#fff0d8" stroke="#e8b76b"/>
      <text x="14" y="35" class="ink code">ESTJ</text>
    </g>
    <g transform="translate(252 144)">
      <rect width="70" height="54" rx="12" fill="#fde7ef" stroke="#e6a5bc"/>
      <text x="12" y="35" class="ink code">ESFJ</text>
    </g>
    <g transform="translate(0 216)">
      <rect width="70" height="54" rx="12" fill="#eef1f0" stroke="#cfd8d5"/>
      <text x="17" y="35" class="ink code">ISTP</text>
    </g>
    <g transform="translate(84 216)">
      <rect width="70" height="54" rx="12" fill="#fde7ef" stroke="#e6a5bc"/>
      <text x="15" y="35" class="ink code">ISFP</text>
    </g>
    <g transform="translate(168 216)">
      <rect width="70" height="54" rx="12" fill="#fff0d8" stroke="#e8b76b"/>
      <text x="13" y="35" class="ink code">ESTP</text>
    </g>
    <g transform="translate(252 216)">
      <rect width="70" height="54" rx="12" fill="#fde7ef" stroke="#e6a5bc"/>
      <text x="12" y="35" class="ink code">ESFP</text>
    </g>
  </g>
  <g transform="translate(95 560)">
    <rect width="292" height="110" rx="16" class="soft"/>
    <text x="24" y="38" class="ink" font-size="20" font-weight="900">Never collapse too early</text>
    <text x="24" y="68" class="muted" font-size="15" font-weight="650">Leader, runner-up, serious third</text>
    <text x="24" y="92" class="muted" font-size="15" font-weight="650">remain visible after each round.</text>
  </g>
  <g transform="translate(95 700)">
    <rect width="292" height="92" rx="16" fill="#172120"/>
    <text x="24" y="39" class="white" font-size="20" font-weight="900">Core invariant</text>
    <text x="24" y="68" fill="#cfe8e4" font-size="17" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">hypotheses, not verdicts</text>
  </g>

  <circle cx="805" cy="515" r="252" fill="url(#coreGlow)" stroke="#cad5d2" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="805" cy="515" r="180" fill="#ffffff" stroke="#d9dfdd" stroke-width="2"/>
  <circle cx="805" cy="515" r="108" fill="#172120"/>
  <text x="724" y="498" class="white" font-size="24" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Evidence</text>
  <text x="738" y="531" class="white" font-size="24" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Ledger</text>
  <text x="712" y="565" fill="#b9d8d4" font-size="17" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">support / weaken / caveat</text>

  <g transform="translate(612 236)">
    <rect width="386" height="92" rx="18" class="soft"/>
    <circle cx="44" cy="46" r="24" class="teal"/>
    <path d="M33 46 h22 M44 35 v22" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="82" y="39" class="ink label">Intake router</text>
    <text x="82" y="66" class="muted small">claim, transcript, old report, contradiction</text>
  </g>
  <g transform="translate(1050 406)">
    <rect width="330" height="104" rx="18" class="soft"/>
    <circle cx="45" cy="52" r="24" class="amber"/>
    <text x="33" y="60" fill="#fff" font-size="21" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">vs</text>
    <text x="84" y="45" class="ink label">Duel router</text>
    <text x="84" y="73" class="muted small">ENTJ vs INTJ, INFJ vs INFP, etc.</text>
  </g>
  <g transform="translate(1016 612)">
    <rect width="362" height="114" rx="18" class="soft"/>
    <circle cx="45" cy="57" r="24" class="magenta"/>
    <path d="M45 42 v20 M45 70 h1" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="84" y="46" class="ink label">Contradiction gate</text>
    <text x="84" y="74" class="muted small">stress / public / recovery states</text>
  </g>
  <g transform="translate(586 730)">
    <rect width="438" height="104" rx="18" class="soft"/>
    <circle cx="48" cy="52" r="24" fill="#26302f"/>
    <path d="M36 43 h24 M36 52 h20 M36 61 h30" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="88" y="45" class="ink label">Report audit</text>
    <text x="88" y="73" class="muted small">runner-up, falsifiers, boundary</text>
  </g>
  <g transform="translate(448 406)">
    <rect width="216" height="104" rx="18" class="soft"/>
    <circle cx="45" cy="52" r="24" class="teal"/>
    <path d="M34 55 l8 8 l17 -24" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="45" class="ink" font-size="20" font-weight="900">Signal parser</text>
    <text x="80" y="73" class="muted small">normal state first</text>
  </g>
  <g transform="translate(448 600)">
    <rect width="216" height="104" rx="18" class="soft"/>
    <circle cx="45" cy="52" r="24" class="amber"/>
    <path d="M32 52 h26 M45 39 v26" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="80" y="45" class="ink" font-size="20" font-weight="900">Next probe</text>
    <text x="80" y="73" class="muted small">one fork at a time</text>
  </g>

  <path d="M805 328 C805 365 805 390 805 407" class="line"/>
  <path d="M913 486 C960 460 1004 450 1050 458" class="line2"/>
  <path d="M910 595 C950 630 976 652 1016 662" class="line2"/>
  <path d="M805 695 C805 716 805 720 805 730" class="line"/>
  <path d="M664 458 C678 460 688 465 697 471" class="line"/>
  <path d="M700 602 C684 622 674 638 664 652" class="line2"/>
  <path d="M420 650 C438 650 440 650 448 650" class="line dash"/>
  <path d="M420 375 C430 405 438 430 448 458" class="line dash"/>

  <rect x="1440" y="150" width="82" height="760" rx="22" class="dark"/>
  <g transform="translate(1463 196)">
    <circle cx="18" cy="18" r="18" fill="#39c6b8"/>
    <text x="9" y="26" fill="#172120" font-size="23" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">1</text>
    <path d="M18 45 V105" stroke="#7b8a87" stroke-width="4" stroke-linecap="round"/>
    <circle cx="18" cy="132" r="18" fill="#f7b84b"/>
    <text x="8" y="140" fill="#172120" font-size="23" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">2</text>
    <path d="M18 159 V219" stroke="#7b8a87" stroke-width="4" stroke-linecap="round"/>
    <circle cx="18" cy="246" r="18" fill="#e95f8f"/>
    <text x="8" y="254" fill="#172120" font-size="23" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">3</text>
    <path d="M18 273 V333" stroke="#7b8a87" stroke-width="4" stroke-linecap="round"/>
    <circle cx="18" cy="360" r="18" fill="#ffffff"/>
    <text x="8" y="368" fill="#172120" font-size="23" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">4</text>
    <path d="M18 387 V447" stroke="#7b8a87" stroke-width="4" stroke-linecap="round"/>
    <circle cx="18" cy="474" r="18" fill="#39c6b8"/>
    <text x="8" y="482" fill="#172120" font-size="23" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">5</text>
  </g>
  <text x="1438" y="866" fill="#cfe8e4" font-size="16" font-weight="800" font-family="Inter, ui-sans-serif, system-ui" transform="rotate(-90 1438 866)">round-by-round state machine</text>

  <rect x="1182" y="765" width="210" height="96" rx="18" fill="#ffffff" stroke="#d9dfdd" stroke-width="2"/>
  <text x="1210" y="805" class="ink" font-size="20" font-weight="900">Falsifier bank</text>
  <text x="1210" y="834" class="muted small">what would change</text>
  <path d="M1182 812 C1135 812 1098 796 1024 782" class="line2 dash"/>
</svg>
