<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Trust loop dashboard for MBTI Typing Skill</title>
  <desc id="desc">A dashboard-style diagram linking user feedback, benchmark cases, scorecards, GitHub Pages, releases, and safety boundaries into a repeatable trust loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172120"/>
      <stop offset="0.55" stop-color="#202b2a"/>
      <stop offset="1" stop-color="#3a2b19"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39c6b8"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7b84b"/>
      <stop offset="1" stop-color="#b66a08"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e95f8f"/>
      <stop offset="1" stop-color="#9d174d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#39c6b8"/>
    </marker>
    <marker id="arrowAmber" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#f7b84b"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.18); stroke-width: 2; filter: url(#shadow); }
      .card { fill: rgba(255,255,255,0.12); stroke: rgba(255,255,255,0.20); stroke-width: 2; }
      .white { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #b9c9c6; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 46px; font-weight: 900; }
      .label { font-size: 24px; font-weight: 900; }
      .small { font-size: 17px; font-weight: 700; }
      .micro { font-size: 15px; font-weight: 700; }
      .teal { fill: url(#teal); }
      .amber { fill: url(#amber); }
      .magenta { fill: url(#magenta); }
      .line { fill: none; stroke: #39c6b8; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .line2 { fill: none; stroke: #f7b84b; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrowAmber); }
      .dash { stroke-dasharray: 10 12; }
      .tick { stroke: rgba(255,255,255,0.20); stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="80" y="78" class="white title">Trust Loop Dashboard</text>
  <text x="82" y="113" class="muted small">The repository earns trust by turning user confusion into tests, tests into releases, and releases back into better first-run UX.</text>

  <rect x="70" y="150" width="450" height="660" rx="22" class="panel"/>
  <text x="105" y="198" class="white label">Live evidence intake</text>
  <text x="105" y="229" class="muted small">Where real ambiguity enters the system.</text>
  <g transform="translate(105 270)">
    <rect width="360" height="82" rx="16" class="card"/>
    <circle cx="42" cy="41" r="23" class="teal"/>
    <path d="M31 41 h22 M42 30 v22" stroke="#172120" stroke-width="5" stroke-linecap="round"/>
    <text x="82" y="35" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Session Lab trial</text>
    <text x="82" y="60" class="muted micro">claim, notes, share link, JSON import</text>
  </g>
  <g transform="translate(105 382)">
    <rect width="360" height="82" rx="16" class="card"/>
    <circle cx="42" cy="41" r="23" class="amber"/>
    <path d="M30 46 c10 -25 24 -25 34 0 M36 40 h22" stroke="#172120" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text x="82" y="35" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Exported transcript</text>
    <text x="82" y="60" class="muted micro">multi-round chats and contradictions</text>
  </g>
  <g transform="translate(105 494)">
    <rect width="360" height="82" rx="16" class="card"/>
    <circle cx="42" cy="41" r="23" class="magenta"/>
    <path d="M42 28 v18 M42 54 h1" stroke="#172120" stroke-width="5" stroke-linecap="round"/>
    <text x="82" y="35" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Failure signature</text>
    <text x="82" y="60" class="muted micro">overclaim, missing runner-up, framework mix</text>
  </g>
  <g transform="translate(105 628)">
    <rect width="360" height="116" rx="16" fill="rgba(57,198,184,0.12)" stroke="rgba(57,198,184,0.36)" stroke-width="2"/>
    <text x="24" y="38" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">User hook that is allowed</text>
    <text x="24" y="70" class="muted micro">I can see why the question changed.</text>
    <text x="24" y="94" class="muted micro">I can see what would change the type.</text>
  </g>

  <rect x="585" y="150" width="460" height="660" rx="22" class="panel"/>
  <text x="620" y="198" class="white label">Verification stack</text>
  <text x="620" y="229" class="muted small">Every strong claim needs an executable backstop.</text>

  <g transform="translate(635 282)">
    <circle cx="180" cy="180" r="160" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
    <circle cx="180" cy="180" r="118" fill="rgba(57,198,184,0.10)" stroke="rgba(57,198,184,0.36)" stroke-width="2"/>
    <circle cx="180" cy="180" r="72" fill="#ffffff"/>
    <text x="118" y="170" fill="#172120" font-size="22" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">make</text>
    <text x="120" y="200" fill="#172120" font-size="22" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">test</text>

    <g transform="translate(150 0)">
      <circle cx="30" cy="30" r="30" class="teal"/>
      <text x="12" y="38" fill="#172120" font-size="21" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">35</text>
      <text x="-24" y="75" class="muted micro">skill score</text>
    </g>
    <g transform="translate(296 140)">
      <circle cx="30" cy="30" r="30" class="amber"/>
      <text x="12" y="38" fill="#172120" font-size="21" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">60</text>
      <text x="-34" y="75" class="muted micro">session lab</text>
    </g>
    <g transform="translate(150 296)">
      <circle cx="30" cy="30" r="30" class="magenta"/>
      <text x="8" y="38" fill="#172120" font-size="21" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">UX</text>
      <text x="-28" y="75" class="muted micro">repo score</text>
    </g>
    <g transform="translate(0 140)">
      <circle cx="30" cy="30" r="30" fill="#ffffff"/>
      <path d="M18 31 l8 8 l17 -24" stroke="#172120" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="-18" y="75" class="muted micro">golden fixtures</text>
    </g>

    <path d="M180 60 C250 70 300 105 326 170" class="line"/>
    <path d="M310 210 C284 278 246 310 180 326" class="line2"/>
    <path d="M140 310 C78 286 48 244 30 170" class="line"/>
    <path d="M48 132 C78 82 112 62 180 60" class="line2"/>
  </g>

  <g transform="translate(620 692)">
    <rect width="390" height="62" rx="14" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <text x="22" y="39" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">No cache artifacts; no hidden runtime</text>
  </g>

  <rect x="1108" y="150" width="420" height="660" rx="22" class="panel"/>
  <text x="1143" y="198" class="white label">Release and community</text>
  <text x="1143" y="229" class="muted small">The public repo makes progress inspectable.</text>

  <g transform="translate(1143 280)">
    <rect width="330" height="78" rx="16" class="card"/>
    <text x="24" y="32" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">GitHub Pages</text>
    <text x="24" y="57" class="muted micro">Session Lab opens before install</text>
    <path d="M260 25 h42 M260 39 h42 M260 53 h25" stroke="#39c6b8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(1143 386)">
    <rect width="330" height="78" rx="16" class="card"/>
    <text x="24" y="32" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Versioned release</text>
    <text x="24" y="57" class="muted micro">Changelog + citation</text>
    <circle cx="280" cy="39" r="24" class="amber"/>
    <path d="M268 40 h24 M280 28 v24" stroke="#172120" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(1143 492)">
    <rect width="330" height="78" rx="16" class="card"/>
    <text x="24" y="32" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Benchmark issue</text>
    <text x="24" y="57" class="muted micro">A bad typing becomes a fixture</text>
    <circle cx="280" cy="39" r="24" class="magenta"/>
    <path d="M269 42 c8 -20 22 -20 30 0 M274 38 h20" stroke="#172120" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(1143 628)">
    <rect width="330" height="116" rx="16" fill="rgba(247,184,75,0.11)" stroke="rgba(247,184,75,0.36)" stroke-width="2"/>
    <text x="24" y="38" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Boundary that protects trust</text>
    <text x="24" y="70" class="muted micro">No clinical, hiring, legal, or deterministic use.</text>
    <text x="24" y="94" class="muted micro">Useful self-reflection, not identity verdict.</text>
  </g>

  <path d="M520 312 C560 312 575 312 610 332" class="line"/>
  <path d="M520 423 C560 423 575 413 610 393" class="line2"/>
  <path d="M520 534 C560 534 575 552 610 590" class="line"/>
  <path d="M1045 330 C1072 330 1082 330 1108 330" class="line"/>
  <path d="M1045 438 C1072 438 1082 426 1108 426" class="line2"/>
  <path d="M1275 744 C1180 850 490 850 315 744" class="line dash"/>

  <g transform="translate(83 835)">
    <path d="M0 0 H1434" class="tick"/>
    <circle cx="0" cy="0" r="8" fill="#39c6b8"/>
    <circle cx="475" cy="0" r="8" fill="#f7b84b"/>
    <circle cx="950" cy="0" r="8" fill="#e95f8f"/>
    <circle cx="1434" cy="0" r="8" fill="#39c6b8"/>
    <text x="0" y="34" class="muted micro">real ambiguity</text>
    <text x="430" y="34" class="muted micro">executable proof</text>
    <text x="900" y="34" class="muted micro">public release</text>
    <text x="1320" y="34" class="muted micro">better first run</text>
  </g>
</svg>
