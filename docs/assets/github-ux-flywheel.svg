<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">GitHub UX Flywheel for MBTI Typing Skill</title>
  <desc id="desc">A product-experience flywheel showing how a GitHub visitor scans the README, tries the Experience Hub, verifies proof, installs the Core Pack, returns with evidence, and contributes safely.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="0.5" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#fff6e8"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#35c5b8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b66a08"/>
      <stop offset="1" stop-color="#f4ba52"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9d174d"/>
      <stop offset="1" stop-color="#eb6f98"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172120"/>
      <stop offset="1" stop-color="#31413e"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#172120" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-teal" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M1 1 L14 8 L1 15 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M1 1 L14 8 L1 15 Z" fill="#b66a08"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #ffffff; stroke: #d7dfdc; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: rgba(255,255,255,0.72); stroke: #d7dfdc; stroke-width: 2; }
      .ink { fill: #172120; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #63706d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 44px; font-weight: 900; }
      .label { font-size: 24px; font-weight: 900; }
      .small { font-size: 17px; font-weight: 650; }
      .micro { font-size: 15px; font-weight: 760; }
      .teal { fill: url(#teal); }
      .amber { fill: url(#amber); }
      .rose { fill: url(#rose); }
      .dark { fill: url(#dark); }
      .line { fill: none; stroke: #0f766e; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrow-teal); }
      .line2 { fill: none; stroke: #b66a08; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrow-amber); }
      .dash { stroke-dasharray: 12 12; }
      .grid { stroke: #dfe6e4; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <g opacity="0.38">
    <path class="grid" d="M80 155 H1520"/>
    <path class="grid" d="M80 285 H1520"/>
    <path class="grid" d="M80 415 H1520"/>
    <path class="grid" d="M80 545 H1520"/>
    <path class="grid" d="M80 675 H1520"/>
    <path class="grid" d="M80 805 H1520"/>
    <path class="grid" d="M250 100 V880"/>
    <path class="grid" d="M520 100 V880"/>
    <path class="grid" d="M790 100 V880"/>
    <path class="grid" d="M1060 100 V880"/>
    <path class="grid" d="M1330 100 V880"/>
  </g>

  <text x="80" y="78" class="ink title">GitHub UX Flywheel</text>
  <text x="82" y="114" class="muted small">A repository should convert curiosity into a local try-run, then into proof, installation, return evidence, and safe contribution.</text>

  <circle cx="800" cy="505" r="292" fill="#ffffff" stroke="#d3ddda" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="800" cy="505" r="214" fill="#fbfdfc" stroke="#dce4e1" stroke-width="2"/>
  <circle cx="800" cy="505" r="126" class="dark"/>
  <text x="712" y="485" class="white" font-size="25" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">Sticky precision</text>
  <text x="724" y="520" fill="#cce7e3" font-size="17" font-weight="750" font-family="Inter, ui-sans-serif, system-ui">chosen next question</text>
  <text x="743" y="548" fill="#cce7e3" font-size="17" font-weight="750" font-family="Inter, ui-sans-serif, system-ui">visible runner-up</text>

  <g transform="translate(665 174)">
    <rect width="270" height="110" rx="18" class="panel"/>
    <circle cx="50" cy="55" r="26" class="teal"/>
    <path d="M37 55 h26 M50 42 v26" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="94" y="47" class="ink label">First scan</text>
    <text x="94" y="75" class="muted small">README, hero, badges</text>
  </g>
  <g transform="translate(1088 306)">
    <rect width="300" height="118" rx="18" class="panel"/>
    <circle cx="54" cy="59" r="27" class="amber"/>
    <path d="M40 58 h28 M54 44 v28" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="98" y="48" class="ink label">Try locally</text>
    <text x="98" y="76" class="muted small">Experience Hub, no account</text>
  </g>
  <g transform="translate(1075 602)">
    <rect width="322" height="120" rx="18" class="panel"/>
    <circle cx="55" cy="60" r="27" class="rose"/>
    <path d="M43 61 l9 9 l20 -28" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="48" class="ink label">Trust proof</text>
    <text x="100" y="76" class="muted small">make test, audits, caveats</text>
  </g>
  <g transform="translate(620 758)">
    <rect width="360" height="118" rx="18" class="panel"/>
    <circle cx="55" cy="59" r="27" class="teal"/>
    <path d="M43 50 h24 M43 59 h19 M43 68 h29" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="100" y="48" class="ink label">Install Core Pack</text>
    <text x="100" y="76" class="muted small">Codex, Claude, Cursor, opencode</text>
  </g>
  <g transform="translate(205 602)">
    <rect width="332" height="120" rx="18" class="panel"/>
    <circle cx="55" cy="60" r="27" class="amber"/>
    <path d="M55 43 v22 M55 73 h1" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="100" y="48" class="ink label">Return with evidence</text>
    <text x="100" y="76" class="muted small">follow-up, contradiction, JSON</text>
  </g>
  <g transform="translate(218 306)">
    <rect width="318" height="118" rx="18" class="panel"/>
    <circle cx="54" cy="59" r="27" class="rose"/>
    <path d="M40 66 c9 -25 30 -25 39 0 M47 58 h25" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text x="98" y="48" class="ink label">Contribute safely</text>
    <text x="98" y="76" class="muted small">issue seed, redaction, boundary</text>
  </g>

  <path d="M885 284 C1005 290 1066 310 1088 348" class="line"/>
  <path d="M1240 424 C1288 500 1285 560 1210 602" class="line2"/>
  <path d="M1075 690 C985 764 958 788 980 817" class="line"/>
  <path d="M620 817 C520 805 465 760 420 722" class="line2"/>
  <path d="M330 602 C265 525 258 468 325 424" class="line"/>
  <path d="M536 348 C616 260 650 245 665 230" class="line2"/>

  <g transform="translate(90 820)">
    <rect width="410" height="86" rx="18" fill="#172120"/>
    <text x="28" y="36" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">No fake certainty</text>
    <text x="28" y="64" fill="#cce7e3" font-size="16" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">Retention comes from state, not identity flattery.</text>
  </g>
  <g transform="translate(1095 820)">
    <rect width="410" height="86" rx="18" fill="#172120"/>
    <text x="28" y="36" class="white" font-size="20" font-weight="900" font-family="Inter, ui-sans-serif, system-ui">User-facing proof</text>
    <text x="28" y="62" fill="#cce7e3" font-size="15" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">README, Experience Hub, audits,</text>
    <text x="28" y="82" fill="#cce7e3" font-size="15" font-weight="700" font-family="Inter, ui-sans-serif, system-ui">and make test stay connected.</text>
  </g>
  <g transform="translate(626 910)">
    <rect width="348" height="40" rx="20" fill="#ffffff" stroke="#cfd8d5" stroke-width="2"/>
    <text x="34" y="26" class="ink micro">README -> Experience Hub -> audits -> release</text>
  </g>
</svg>
