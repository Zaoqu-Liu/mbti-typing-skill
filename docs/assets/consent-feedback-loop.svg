<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" viewBox="0 0 1500 880" role="img" aria-labelledby="title desc">
  <title id="title">Consent Feedback Loop</title>
  <desc id="desc">A workflow diagram showing consent, redaction, delayed observations, privacy audit, follow-up packets, and benchmark improvement for MBTI typing work.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f6; }
      .panel { fill: #ffffff; stroke: #d8dfdc; stroke-width: 2; rx: 18; }
      .soft { fill: #f9fbfa; stroke: #d8dfdc; stroke-width: 2; rx: 14; }
      .title { font: 900 40px Inter, system-ui, sans-serif; fill: #172120; }
      .subtitle { font: 650 16px Inter, system-ui, sans-serif; fill: #64716e; }
      .label { font: 850 20px Inter, system-ui, sans-serif; fill: #172120; }
      .small { font: 700 13px Inter, system-ui, sans-serif; fill: #64716e; }
      .tiny { font: 750 11px Inter, system-ui, sans-serif; fill: #64716e; }
      .metric { font: 900 27px Inter, system-ui, sans-serif; fill: #172120; }
      .white { fill: #ffffff; }
      .dark { fill: #24302e; }
      .green { fill: #16836f; }
      .greenSoft { fill: #e4f4ef; stroke: #8ecabc; stroke-width: 1.5; }
      .blue { fill: #3266a8; }
      .blueSoft { fill: #e7eef9; stroke: #a8c0e3; stroke-width: 1.5; }
      .amber { fill: #b97312; }
      .amberSoft { fill: #fff0d9; stroke: #ddb169; stroke-width: 1.5; }
      .red { fill: #b93d5b; }
      .redSoft { fill: #fde8ee; stroke: #e3a7b7; stroke-width: 1.5; }
      .line { fill: none; stroke: #24302e; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #87928f; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 7 8; }
      .arrow { fill: #24302e; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="880"/>
  <path d="M0 0 H1500 V248 C1248 212 1110 318 862 244 C616 170 472 282 0 196 Z" fill="#e4f4ef"/>
  <path d="M1500 880 H0 V654 C256 696 444 570 694 642 C960 720 1152 604 1500 680 Z" fill="#fff0d9"/>

  <rect x="54" y="46" width="1392" height="124" class="panel"/>
  <text x="88" y="105" class="title">Consent Feedback Loop</text>
  <text x="90" y="138" class="subtitle">Real ambiguity can improve the skill only after consent, redaction, delayed observations, and a privacy audit.</text>
  <rect x="1180" y="76" width="212" height="58" rx="12" class="dark"/>
  <text x="1212" y="100" class="tiny white">PUBLIC DATA RULE</text>
  <text x="1214" y="124" class="label white">redacted first</text>

  <rect x="74" y="232" width="236" height="172" class="panel"/>
  <circle cx="120" cy="284" r="27" class="green"/>
  <text x="111" y="292" class="label white">1</text>
  <text x="158" y="276" class="label">Consent</text>
  <text x="158" y="302" class="small">Subject agrees to public-safe summary</text>
  <rect x="104" y="336" width="176" height="34" rx="10" class="greenSoft"/>
  <text x="128" y="358" class="small">withdrawal note</text>

  <rect x="376" y="232" width="236" height="172" class="panel"/>
  <circle cx="422" cy="284" r="27" class="blue"/>
  <text x="413" y="292" class="label white">2</text>
  <text x="460" y="276" class="label">Redaction</text>
  <text x="460" y="302" class="small">No names, handles, exact dates</text>
  <rect x="406" y="336" width="176" height="34" rx="10" class="blueSoft"/>
  <text x="430" y="358" class="small">[PERSON_A]</text>

  <rect x="678" y="216" width="306" height="204" class="panel"/>
  <circle cx="724" cy="268" r="27" class="amber"/>
  <text x="715" y="276" class="label white">3</text>
  <text x="762" y="260" class="label">Delayed Observations</text>
  <text x="762" y="286" class="small">Normal, stress, recovery, reflection</text>
  <g transform="translate(712 324)">
    <rect x="0" y="0" width="120" height="32" rx="9" class="amberSoft"/>
    <text x="24" y="21" class="small">normal</text>
    <rect x="136" y="0" width="120" height="32" rx="9" class="amberSoft"/>
    <text x="164" y="21" class="small">stress</text>
    <rect x="0" y="44" width="120" height="32" rx="9" class="amberSoft"/>
    <text x="22" y="65" class="small">recovery</text>
    <rect x="136" y="44" width="120" height="32" rx="9" class="amberSoft"/>
    <text x="154" y="65" class="small">reflection</text>
  </g>

  <rect x="1062" y="232" width="364" height="172" class="panel"/>
  <circle cx="1108" cy="284" r="27" class="red"/>
  <text x="1099" y="292" class="label white">4</text>
  <text x="1146" y="276" class="label">Consent Redaction Audit</text>
  <text x="1146" y="302" class="small">Identifier scan + packet quality gates</text>
  <rect x="1094" y="336" width="142" height="34" rx="10" class="redSoft"/>
  <text x="1112" y="358" class="small">privacy safe</text>
  <rect x="1248" y="336" width="142" height="34" rx="10" class="redSoft"/>
  <text x="1270" y="358" class="small">data minimal</text>

  <path d="M310 318 H360" class="line"/>
  <path d="M360 318 l-13 -8 v16 Z" class="arrow"/>
  <path d="M612 318 H662" class="line"/>
  <path d="M662 318 l-13 -8 v16 Z" class="arrow"/>
  <path d="M984 318 H1046" class="line"/>
  <path d="M1046 318 l-13 -8 v16 Z" class="arrow"/>

  <rect x="118" y="508" width="270" height="162" class="soft"/>
  <text x="150" y="554" class="label">Follow-Up Packet</text>
  <text x="150" y="584" class="small">candidate set + falsifier + user feedback</text>
  <text x="150" y="626" class="metric">public-safe</text>

  <rect x="462" y="508" width="270" height="162" class="soft"/>
  <text x="494" y="554" class="label">Issue Template</text>
  <text x="494" y="584" class="small">consented_followup.yml</text>
  <text x="494" y="626" class="metric">structured</text>

  <rect x="806" y="508" width="270" height="162" class="soft"/>
  <text x="838" y="554" class="label">Repository Action</text>
  <text x="838" y="584" class="small">benchmark, fixture, duel, or audit rule</text>
  <text x="838" y="626" class="metric">mergeable</text>

  <rect x="1150" y="508" width="270" height="162" class="soft"/>
  <text x="1182" y="554" class="label">User Return Loop</text>
  <text x="1182" y="584" class="small">next observation prompt</text>
  <text x="1182" y="626" class="metric">ethical</text>

  <path d="M1244 404 C1232 466 250 450 253 508" class="dash"/>
  <path d="M253 508 l-10 -13 l16 4 Z" class="arrow"/>
  <path d="M388 590 H446" class="line"/>
  <path d="M446 590 l-13 -8 v16 Z" class="arrow"/>
  <path d="M732 590 H790" class="line"/>
  <path d="M790 590 l-13 -8 v16 Z" class="arrow"/>
  <path d="M1076 590 H1134" class="line"/>
  <path d="M1134 590 l-13 -8 v16 Z" class="arrow"/>
  <path d="M1285 508 C1260 460 1208 430 1165 404" class="dash"/>
  <path d="M1165 404 l16 -1 l-9 13 Z" class="arrow"/>

  <rect x="228" y="738" width="1044" height="64" rx="18" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
  <text x="286" y="764" class="small">Allowed real-world learning loop</text>
  <text x="286" y="786" class="label">Users return with delayed evidence only when the repository protects consent, anonymity, and revision boundaries.</text>
</svg>
