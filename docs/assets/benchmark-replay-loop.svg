<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark Replay Loop</title>
  <desc id="desc">A complex workflow diagram showing how canonical benchmark cases become a local-first Benchmark Replay Lab with blind prompts, user guesses, reference reveal, Replay Receipt, repair prompt, issue seed, sync script, audit gate, and release feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbfa"/>
      <stop offset="0.46" stop-color="#eef7f5"/>
      <stop offset="1" stop-color="#fff5e7"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172120"/>
      <stop offset="1" stop-color="#33403e"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="146%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#172120" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#26302f"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <style>
      .title { font: 900 42px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172120; letter-spacing: 0; }
      .subtitle { font: 600 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #63706d; letter-spacing: 0; }
      .panel-title { font: 900 21px Inter, ui-sans-serif, system-ui, sans-serif; fill: #172120; letter-spacing: 0; }
      .panel-title-light { font: 900 21px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .copy { font: 600 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #63706d; letter-spacing: 0; }
      .copy-light { font: 600 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #d7e1df; letter-spacing: 0; }
      .small { font: 900 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #475654; letter-spacing: 0; text-transform: uppercase; }
      .small-light { font: 900 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #bfe8e3; letter-spacing: 0; text-transform: uppercase; }
      .mono { font: 800 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #26302f; letter-spacing: 0; }
      .mono-light { font: 800 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #e8f5f3; letter-spacing: 0; }
      .micro { font: 800 10.5px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #26302f; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #d9dfdd; stroke-width: 1.4; rx: 14; filter: url(#shadow); }
      .dark-card { fill: url(#dark); stroke: #40514f; stroke-width: 1.4; rx: 16; filter: url(#shadow); }
      .soft { fill: #fbfdfc; stroke: #d9dfdd; stroke-width: 1.2; rx: 12; }
      .gate-ok { fill: #e1f3f0; stroke: #b8deda; stroke-width: 1.2; rx: 12; }
      .gate-risk { fill: #fff0d7; stroke: #f0c989; stroke-width: 1.2; rx: 12; }
      .gate-stop { fill: #fde7ee; stroke: #efb6c7; stroke-width: 1.2; rx: 12; }
      .wire { fill: none; stroke: #26302f; stroke-width: 2.6; marker-end: url(#arrow); }
      .wire-teal { fill: none; stroke: #0f766e; stroke-width: 3; marker-end: url(#arrowTeal); }
      .wire-amber { fill: none; stroke: #b45309; stroke-width: 3; marker-end: url(#arrowAmber); }
      .wire-soft { fill: none; stroke: #94a3a0; stroke-width: 1.6; stroke-dasharray: 7 8; }
      .node { fill: #0f766e; stroke: #ccfbf1; stroke-width: 3; }
      .node-amber { fill: #b45309; stroke: #fde68a; stroke-width: 3; }
      .node-rose { fill: #be123c; stroke: #fecdd3; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1500" height="940" fill="url(#bg)"/>
  <rect x="44" y="36" width="1412" height="858" rx="26" fill="#ffffff" opacity="0.74" stroke="#d9dfdd"/>

  <text x="82" y="96" class="title">Benchmark Replay Loop</text>
  <text x="82" y="128" class="subtitle">Turn benchmark cases into a blind, local-first replay game: guess, reveal, repair, and contribute without exposing private data.</text>
  <text x="1196" y="96" class="small">GitHub UX</text>
  <text x="1196" y="126" class="panel-title">Stickiness through proof</text>

  <rect x="82" y="178" width="254" height="210" class="dark-card"/>
  <text x="112" y="222" class="small-light">Source</text>
  <text x="112" y="252" class="panel-title-light">Canonical Cases</text>
  <text x="112" y="286" class="mono-light">benchmark-cases.json</text>
  <text x="112" y="326" class="copy-light">16 leading types, runner-ups,</text>
  <text x="112" y="350" class="copy-light">traps, evidence tags, and</text>
  <text x="112" y="374" class="copy-light">strongest falsifiers.</text>

  <rect x="388" y="178" width="254" height="210" class="card"/>
  <text x="418" y="222" class="small">Sync</text>
  <text x="418" y="252" class="panel-title">Replay Data</text>
  <text x="418" y="286" class="mono">sync_benchmark_replay_lab.py</text>
  <rect x="418" y="316" width="178" height="34" class="gate-ok"/>
  <text x="438" y="338" class="micro">REPLAY_CASES JSON</text>
  <text x="418" y="374" class="copy">Generated block cannot drift.</text>

  <rect x="694" y="178" width="304" height="210" class="card"/>
  <text x="724" y="222" class="small">Workbench</text>
  <text x="724" y="252" class="panel-title">Benchmark Replay Lab</text>
  <text x="724" y="286" class="mono">benchmark-replay-lab.html</text>
  <g transform="translate(724 318)">
    <rect width="112" height="34" class="gate-ok"/>
    <text x="18" y="22" class="micro">Blind Prompt</text>
    <rect x="124" width="120" height="34" class="gate-risk"/>
    <text x="144" y="22" class="micro">Guess Gates</text>
  </g>
  <text x="724" y="374" class="copy">User plays before seeing the reference.</text>

  <rect x="1050" y="178" width="332" height="210" class="dark-card"/>
  <text x="1080" y="222" class="small-light">Reveal</text>
  <text x="1080" y="252" class="panel-title-light">Reference Board</text>
  <text x="1080" y="286" class="copy-light">Leading, serious runner-up, evidence tags,</text>
  <text x="1080" y="310" class="copy-light">trap, and Strongest falsifier appear only</text>
  <text x="1080" y="334" class="copy-light">after the replay guess is recorded.</text>
  <rect x="1080" y="354" width="170" height="34" class="gate-risk"/>
  <text x="1102" y="376" class="micro">Reveal Reference</text>

  <path class="wire-teal" d="M 336 282 C 356 282 366 282 388 282"/>
  <path class="wire-teal" d="M 642 282 C 664 282 672 282 694 282"/>
  <path class="wire-amber" d="M 998 282 C 1020 282 1028 282 1050 282"/>

  <rect x="82" y="466" width="270" height="250" class="card"/>
  <text x="112" y="510" class="small">Gate 01</text>
  <text x="112" y="540" class="panel-title">Leading Guess</text>
  <text x="112" y="574" class="copy">Did the replay identify the expected</text>
  <text x="112" y="598" class="copy">leading hypothesis without overfitting</text>
  <text x="112" y="622" class="copy">a surface cue?</text>
  <g transform="translate(112 636)">
    <rect width="82" height="38" class="gate-ok"/>
    <text x="24" y="25" class="micro">Pass</text>
    <rect x="96" width="82" height="38" class="gate-stop"/>
    <text x="120" y="25" class="micro">Miss</text>
  </g>

  <rect x="402" y="466" width="270" height="250" class="card"/>
  <text x="432" y="510" class="small">Gate 02</text>
  <text x="432" y="540" class="panel-title">runner-up Guess</text>
  <text x="432" y="574" class="copy">Did the answer preserve the strongest</text>
  <text x="432" y="598" class="copy">alternative instead of collapsing</text>
  <text x="432" y="622" class="copy">early?</text>
  <g transform="translate(432 636)">
    <rect width="112" height="38" class="gate-ok"/>
    <text x="18" y="25" class="micro">Top-2 alive</text>
    <rect x="126" width="94" height="38" class="gate-risk"/>
    <text x="146" y="25" class="micro">Drift</text>
  </g>

  <rect x="722" y="466" width="270" height="250" class="card"/>
  <text x="752" y="510" class="small">Gate 03</text>
  <text x="752" y="540" class="panel-title">Falsifier Note</text>
  <text x="752" y="574" class="copy">Does the replay name what would weaken</text>
  <text x="752" y="598" class="copy">the leading type or flip the</text>
  <text x="752" y="622" class="copy">interpretation?</text>
  <g transform="translate(752 636)">
    <rect width="118" height="38" class="gate-ok"/>
    <text x="18" y="25" class="micro">Falsifier</text>
    <rect x="132" width="90" height="38" class="gate-stop"/>
    <text x="154" y="25" class="micro">None</text>
  </g>

  <rect x="1042" y="466" width="340" height="250" class="card"/>
  <text x="1072" y="510" class="small">Gate 04</text>
  <text x="1072" y="540" class="panel-title">Trap Awareness</text>
  <text x="1072" y="574" class="copy">Does the replay explicitly resist the trap:</text>
  <text x="1072" y="598" class="copy">surface test result, role competence, warmth,</text>
  <text x="1072" y="622" class="copy">depth, speed, or stress-state confusion?</text>
  <g transform="translate(1072 660)">
    <rect width="110" height="38" class="gate-risk"/>
    <text x="20" y="25" class="micro">Trap note</text>
    <rect x="124" width="136" height="38" class="gate-ok"/>
    <text x="144" y="25" class="micro">Repair Prompt</text>
  </g>

  <path class="wire" d="M 846 388 C 846 420 216 420 216 466"/>
  <path class="wire" d="M 846 388 C 846 422 536 422 536 466"/>
  <path class="wire" d="M 846 388 C 846 422 856 430 856 466"/>
  <path class="wire" d="M 1216 388 C 1216 420 1212 428 1212 466"/>

  <rect x="160" y="782" width="246" height="82" class="soft"/>
  <text x="186" y="812" class="panel-title" style="font-size: 17px;">Replay Receipt</text>
  <text x="186" y="840" class="mono">replay-lab/v1</text>

  <rect x="454" y="782" width="264" height="82" class="soft"/>
  <text x="480" y="812" class="panel-title" style="font-size: 17px;">Repair Prompt</text>
  <text x="480" y="840" class="mono">Use $mbti-typing</text>

  <rect x="766" y="782" width="326" height="82" class="soft"/>
  <text x="792" y="812" class="panel-title" style="font-size: 17px;">Issue Seed</text>
  <text x="792" y="840" class="mono">benchmark_replay_improvement.yml</text>

  <rect x="1140" y="782" width="242" height="82" class="dark-card"/>
  <text x="1168" y="812" class="panel-title-light" style="font-size: 17px;">Release Gate</text>
  <text x="1168" y="840" class="mono-light" style="font-size: 10.5px;">benchmark_replay_lab_audit.py</text>

  <path class="wire-teal" d="M 217 716 C 217 752 244 756 283 782"/>
  <path class="wire-teal" d="M 537 716 C 537 750 566 756 586 782"/>
  <path class="wire-amber" d="M 857 716 C 857 750 898 756 930 782"/>
  <path class="wire-teal" d="M 1212 716 C 1212 752 1234 756 1261 782"/>
  <path class="wire-soft" d="M 1261 864 C 1248 906 193 908 209 388"/>

  <g transform="translate(82 748)">
    <circle cx="0" cy="0" r="14" class="node"/>
    <text x="26" y="5" class="copy">local-first, DOM-safe, source-synced, and visibly bounded before release</text>
  </g>
  <g transform="translate(1052 748)">
    <circle cx="0" cy="0" r="14" class="node-amber"/>
    <text x="26" y="5" class="copy">misses become better prompts, fixtures, duels, or audit gates</text>
  </g>
</svg>
