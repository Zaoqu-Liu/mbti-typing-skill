<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Response Eval Lab Flow</title>
  <desc id="desc">A complex workflow diagram showing how a pasted MBTI answer moves through local-first mode-aware gates, a quality radar, JSON receipt, repair prompt, issue seed, and release audit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10151b"/>
      <stop offset="0.52" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0f766e"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#b45309"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .panel-title { font: 700 18px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .panel-title-dark { font: 700 18px Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .label { font: 600 13px Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .label-dark { font: 600 13px Arial, sans-serif; fill: #e2e8f0; letter-spacing: 0; }
      .tiny { font: 500 11px Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .tiny-dark { font: 500 11px Arial, sans-serif; fill: #94a3b8; letter-spacing: 0; }
      .mono { font: 600 12px Menlo, Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .mono-dark { font: 600 12px Menlo, Consolas, monospace; fill: #cbd5e1; letter-spacing: 0; }
      .micro { font: 600 9.5px Menlo, Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .micro-dark { font: 600 9.5px Menlo, Consolas, monospace; fill: #cbd5e1; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .dark-card { fill: #111827; stroke: #334155; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .soft-card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; }
      .gate-ok { fill: #ecfdf5; stroke: #14b8a6; stroke-width: 1.2; rx: 12; }
      .gate-risk { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.2; rx: 12; }
      .gate-stop { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.2; rx: 12; }
      .wire { fill: none; stroke: #0f766e; stroke-width: 3; marker-end: url(#arrowTeal); }
      .wire-amber { fill: none; stroke: #b45309; stroke-width: 3; marker-end: url(#arrowAmber); }
      .wire-soft { fill: none; stroke: #94a3b8; stroke-width: 1.6; stroke-dasharray: 7 8; }
      .node { fill: #0f766e; stroke: #ccfbf1; stroke-width: 3; }
      .node-amber { fill: #b45309; stroke: #fde68a; stroke-width: 3; }
      .node-rose { fill: #be123c; stroke: #fecdd3; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <path d="M 0 120 C 220 55 330 230 520 160 C 760 70 880 170 1070 96 C 1220 38 1310 76 1400 40 L 1400 0 L 0 0 z" fill="#0f172a" opacity="0.7"/>
  <path d="M 0 800 C 190 744 330 846 500 784 C 704 710 888 780 1075 724 C 1245 673 1340 734 1400 694 L 1400 900 L 0 900 z" fill="#0f172a" opacity="0.72"/>

  <text x="48" y="58" class="title">Response Eval Lab Flow</text>
  <text x="48" y="86" class="subtitle">Paste an MBTI answer. Audit locally. Turn weak precision into repair prompts and response_eval issues.</text>
  <text x="1072" y="58" class="subtitle">GitHub UX promise</text>
  <text x="1072" y="84" class="title" style="font-size: 18px;">Sticky precision</text>

  <rect x="48" y="134" width="250" height="230" class="dark-card"/>
  <text x="72" y="174" class="panel-title-dark">Paste answer</text>
  <text x="72" y="202" class="tiny-dark">Prompt context + model response</text>
  <rect x="72" y="226" width="202" height="42" class="soft-card" opacity="0.14"/>
  <text x="90" y="252" class="mono-dark">modeSelect</text>
  <rect x="72" y="286" width="202" height="18" rx="9" fill="#334155"/>
  <rect x="72" y="318" width="160" height="18" rx="9" fill="#475569"/>
  <rect x="72" y="350" width="190" height="18" rx="9" fill="#334155"/>
  <circle cx="246" cy="247" r="13" class="node"/>
  <text x="84" y="395" class="tiny-dark">No account, no server, no network call.</text>

  <rect x="354" y="122" width="286" height="278" class="card"/>
  <text x="382" y="164" class="panel-title">Mode-aware gates</text>
  <text x="382" y="192" class="tiny">REQUIRED_BY_MODE chooses the right audit surface.</text>
  <rect x="382" y="220" width="104" height="44" class="gate-ok"/>
  <text x="398" y="247" class="label">live_round</text>
  <rect x="506" y="220" width="104" height="44" class="gate-ok"/>
  <text x="522" y="247" class="label">type_duel</text>
  <rect x="382" y="282" width="104" height="44" class="gate-risk"/>
  <text x="394" y="309" class="label">final_report</text>
  <rect x="506" y="282" width="104" height="44" class="gate-stop"/>
  <text x="520" y="309" class="label">anti_pattern</text>
  <text x="384" y="355" class="mono">candidate set</text>
  <text x="506" y="355" class="mono">runner-up</text>
  <text x="384" y="378" class="mono">evidence movement</text>
  <text x="506" y="392" class="mono">next round</text>

  <rect x="704" y="122" width="282" height="278" class="card"/>
  <text x="734" y="164" class="panel-title">Quality radar</text>
  <text x="734" y="192" class="tiny">Visual score is not psychometric ground truth.</text>
  <g transform="translate(846 288)">
    <circle r="96" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle r="72" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <circle r="48" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <circle r="24" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="0" y1="-96" x2="0" y2="96" stroke="#cbd5e1"/>
    <line x1="-83" y1="-48" x2="83" y2="48" stroke="#cbd5e1"/>
    <line x1="83" y1="-48" x2="-83" y2="48" stroke="#cbd5e1"/>
    <polygon points="0,-76 64,-37 58,34 0,84 -54,31 -62,-36" fill="#14b8a6" opacity="0.34" stroke="#0f766e" stroke-width="3"/>
    <circle cx="0" cy="-76" r="5" fill="#0f766e"/>
    <circle cx="64" cy="-37" r="5" fill="#0f766e"/>
    <circle cx="58" cy="34" r="5" fill="#0f766e"/>
    <circle cx="0" cy="84" r="5" fill="#0f766e"/>
    <circle cx="-54" cy="31" r="5" fill="#0f766e"/>
    <circle cx="-62" cy="-36" r="5" fill="#0f766e"/>
  </g>
  <text x="734" y="374" class="tiny">Radar flags weak answers before trust.</text>

  <rect x="1042" y="122" width="306" height="278" class="dark-card"/>
  <text x="1074" y="164" class="panel-title-dark">Gate board</text>
  <text x="1074" y="192" class="tiny-dark">Pass, risk, or blocked anti-pattern.</text>
  <g transform="translate(1074 226)">
    <rect width="116" height="36" class="gate-ok"/>
    <text x="14" y="23" class="label">falsifier</text>
    <rect x="134" width="116" height="36" class="gate-ok"/>
    <text x="148" y="23" class="label">boundary</text>
    <rect y="52" width="116" height="36" class="gate-risk"/>
    <text x="14" y="75" class="label">confidence</text>
    <rect x="134" y="52" width="116" height="36" class="gate-ok"/>
    <text x="148" y="75" class="label">no flattery</text>
    <rect y="104" width="116" height="36" class="gate-stop"/>
    <text x="14" y="127" class="label">overclaim</text>
    <rect x="134" y="104" width="116" height="36" class="gate-ok"/>
    <text x="148" y="127" class="label">copyable</text>
  </g>
  <text x="1074" y="382" class="mono-dark">negative_blocked: 1/1</text>

  <path d="M 298 250 C 330 250 322 250 354 250" class="wire"/>
  <path d="M 640 250 C 672 250 672 250 704 250" class="wire"/>
  <path d="M 986 250 C 1020 250 1010 250 1042 250" class="wire"/>

  <rect x="64" y="486" width="262" height="224" class="card"/>
  <text x="94" y="526" class="panel-title">JSON receipt</text>
  <text x="94" y="554" class="tiny">Machine-readable summary of gates and score.</text>
  <rect x="94" y="582" width="202" height="94" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="114" y="612" class="mono">score: 86</text>
  <text x="114" y="638" class="mono">failed_gates: 1</text>
  <text x="114" y="664" class="mono">mode: live_round</text>
  <circle cx="286" cy="526" r="16" class="node"/>

  <rect x="386" y="486" width="282" height="224" class="card"/>
  <text x="416" y="526" class="panel-title">Repair prompt</text>
  <text x="416" y="554" class="tiny">Copy an exact instruction back into the agent.</text>
  <rect x="416" y="582" width="220" height="94" rx="12" fill="#ecfeff" stroke="#14b8a6"/>
  <text x="436" y="612" class="mono">Use $mbti-typing</text>
  <text x="436" y="638" class="mono">repair missing runner-up</text>
  <text x="436" y="664" class="mono">ask 4-6 scene questions</text>
  <circle cx="630" cy="526" r="16" class="node"/>

  <rect x="728" y="486" width="288" height="224" class="card"/>
  <text x="758" y="526" class="panel-title">Issue seed</text>
  <text x="758" y="554" class="tiny">Failed answer becomes structured contribution.</text>
  <rect x="758" y="582" width="228" height="94" rx="12" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="778" y="610" class="micro">response_eval_improvement.yml</text>
  <text x="778" y="638" class="mono">failed gates + repair</text>
  <text x="778" y="664" class="mono">public-safe snippets</text>
  <circle cx="978" cy="526" r="16" class="node-amber"/>

  <rect x="1074" y="486" width="274" height="224" class="dark-card"/>
  <text x="1104" y="526" class="panel-title-dark">Release audit</text>
  <text x="1104" y="554" class="tiny-dark">The page is tested before GitHub Pages deploys.</text>
  <rect x="1104" y="582" width="212" height="94" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="1124" y="610" class="micro-dark">scripts/response_eval_lab_audit.py</text>
  <text x="1124" y="638" class="mono-dark">Response Eval Lab Audit</text>
  <text x="1124" y="664" class="mono-dark">local-first + DOM-safe</text>
  <circle cx="1304" cy="526" r="16" class="node"/>

  <path d="M 195 400 C 195 440 195 446 195 486" class="wire"/>
  <path d="M 326 600 C 356 600 356 600 386 600" class="wire"/>
  <path d="M 668 600 C 698 600 698 600 728 600" class="wire-amber"/>
  <path d="M 1016 600 C 1046 600 1046 600 1074 600" class="wire"/>
  <path d="M 1210 486 C 1210 436 1194 430 1194 400" class="wire-soft"/>

  <g transform="translate(108 760)">
    <rect width="1184" height="76" rx="22" fill="#0f172a" opacity="0.92" stroke="#334155"/>
    <text x="32" y="32" class="label-dark">User-visible retention loop</text>
    <text x="32" y="56" class="tiny-dark">A weak answer creates a visible failed gate, JSON receipt, repair prompt, and public-safe issue seed.</text>
    <circle cx="872" cy="38" r="18" class="node"/>
    <text x="904" y="43" class="label-dark">local-first</text>
    <circle cx="1004" cy="38" r="18" class="node-amber"/>
    <text x="1036" y="43" class="label-dark">mode-aware</text>
  </g>

  <path d="M 1210 710 C 1210 756 850 754 714 754 C 574 754 526 732 526 710" class="wire-soft"/>
  <path d="M 870 486 C 870 438 846 432 846 400" class="wire-soft"/>
  <path d="M 526 486 C 526 438 496 432 496 400" class="wire-soft"/>
</svg>
